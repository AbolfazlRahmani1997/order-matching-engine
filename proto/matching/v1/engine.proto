syntax = "proto3";

package matching.v1;

option go_package = "github.com/jupiter/gold-proto/matching/v1;matchingv1";

service MatchingEngine {
  rpc PlaceOrder(PlaceOrderRequest) returns (PlaceOrderResponse);
  rpc GetOrder(GetOrderRequest) returns (GetOrderResponse);
  rpc CancelOrder(CancelOrderRequest) returns (CancelOrderResponse);
  rpc GetOrderBook(GetOrderBookRequest) returns (GetOrderBookResponse);
}

message PlaceOrderRequest {
  uint32 user_id = 1;
  string symbol = 2;
  bool is_buy_order = 3;
  double price = 4;
  double quantity = 5;
  int64 expire_sec = 6;
  string bot_id = 7;
}

message PlaceOrderResponse {
  Order order = 1;
  repeated Match matches = 2;
}

message Order {
  uint32 id = 1;
  uint32 user_id = 2;
  string symbol = 3;
  bool is_buy_order = 4;
  double price = 5;
  double quantity = 6;
  double filled_qty = 7;
  string status = 8;
  string bot_id = 9;
}

message Match {
  uint32 buy_id = 1;
  uint32 sell_id = 2;
  double price = 3;
  double quantity = 4;
}

message GetOrderRequest {
  uint32 order_id = 1;
}

message GetOrderResponse {
  Order order = 1;
}

message CancelOrderRequest {
  uint32 order_id = 1;
}

message CancelOrderResponse {
  bool success = 1;
}

message GetOrderBookRequest {
  string symbol = 1;
}

message GetOrderBookResponse {
  string symbol = 1;
  repeated OrderBookItem bids = 2;
  repeated OrderBookItem asks = 3;
  double last_price = 4;
}

message OrderBookItem {
  double price = 1;
  double quantity = 2;
  double filled_qty = 3;
}
